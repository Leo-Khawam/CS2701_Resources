<!DOCTYPE html>
<html lang="en">
<head>
    <title>Fresh Food For All</title>
    <link rel="stylesheet" href="Registration.css"> 
    <script src="Registration.js"></script>
</head>

<body>
    <header></header>

    <nav>
        <ul class="navlist">
            <li><a href="/Home">Home</a></li>
            <li><a href="/Register">Register</a></li>
            <li><a href="/Login">Login</a></li>
            <li><a href="/Help">Help</a></li>
        </ul>
    </nav>

    <main>
        <aside>
            <input type="text" class="search" id="search" name="search" placeholder="Search"><br>
        </aside>

        <section>
            <!-- ✅ FIXED -->
            <form class="center" novalidate onsubmit="submitForm(event)">
                
                <label class="textInput" for="name">Name:</label>
                <input type="text" id="name" name="name" required maxlength="50"><br><br>

                <label class="textInput" for="email">Email:</label>
                <input type="email" id="email" name="email" required><br><br>

                <label class="textInput" for="password">Password:</label>
                <input type="password" id="password" name="password" required minlength="8"><br><br>

                <label class="textInput" for="repPassword">Re-type password:</label>
                <input type="password" id="repPassword" name="repPassword" required minlength="8"><br><br>

                <input type="checkbox" id="buyer" name="buyer">
                <label for="buyer">I want to buy produce directly from allotment owners.</label><br>

                <input type="checkbox" id="seller" name="seller">
                <label for="seller">I want to sell produce from my allotment.</label><br><br>

                <input type="checkbox" id="tos" name="tos" required>
                <label for="tos">
                    I agree to the <a href="">Terms of Use</a> and <a href="">Privacy Policy</a>.
                </label>
                <br><br>

                <!-- ✅ FIXED -->
                <input type="submit" value="Register">

                <a href="">Learn more</a>
            </form>
        </section>
    </main>
</body>
</html>
